<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Davinotti Classifiche - Configurazione</title>
  <style>
    :root {
      --bg: #1d3f0f;
      --bg-2: #315f17;
      --panel: rgba(255,255,255,0.1);
      --panel-border: rgba(255,255,255,0.18);
      --text: #f4f8ee;
      --muted: #d3e2c7;
      --accent: #e56b11;
      --accent-2: #ff8b2b;
      --chip: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg), var(--bg-2));
      min-height: 100vh;
    }
    .wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 20px 36px;
    }
    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.24);
    }
    .logo {
      display: block;
      max-width: 280px;
      height: auto;
      margin-bottom: 18px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      padding: 6px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.15;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 22px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(4px);
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    .options {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    label.option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      background: var(--chip);
      border: 1px solid rgba(255,255,255,0.09);
      cursor: pointer;
      font-size: 14px;
    }
    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      flex: 0 0 auto;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .primary {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: white;
    }
    .secondary {
      background: rgba(255,255,255,0.14);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.16);
    }
    .result {
      margin-top: 22px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      padding: 16px;
      display: none;
    }
    .result.visible { display: block; }
    .result a {
      color: #fff7d8;
      word-break: break-all;
    }
    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <img class="logo" src="__BASE_URL__/davinotti-logo.png" alt="Davinotti logo" onerror="this.style.display='none'">
      <h1>Davinotti Classifiche</h1>
      <p class="sub">Seleziona i cataloghi Davinotti da esporre in Stremio.</p>

      <div class="grid">
		<div class="panel">
		  <h2>Generi</h2>
		  <div class="actions" style="margin-top:0;margin-bottom:14px;">
			<button type="button" class="secondary" id="selectAllGenresBtn">Seleziona tutti i generi</button>
			<button type="button" class="secondary" id="clearGenresBtn">Deseleziona tutti i generi</button>
		  </div>
		  <div class="options" id="genreOptions"></div>
		</div>

		<div class="panel">
		  <h2>Piattaforme streaming</h2>
		  <div class="actions" style="margin-top:0;margin-bottom:14px;">
			<button type="button" class="secondary" id="selectAllStreamingBtn">Seleziona tutto streaming</button>
			<button type="button" class="secondary" id="clearStreamingBtn">Deseleziona tutto streaming</button>
		  </div>
		  <div class="options" id="streamingOptions"></div>
		</div>
      </div>

      <div class="actions">
        <button class="primary" id="installBtn">Genera URL addon</button>
        <button class="secondary" id="selectDefaultsBtn">Seleziona default</button>
        <button class="secondary" id="clearBtn">Deseleziona tutto</button>
      </div>

		<div class="result" id="resultBox">
		  <div><strong>Manifest URL:</strong></div>
		  <div style="margin-top:8px">
			<a id="manifestLink" href="#" target="_blank" rel="noopener noreferrer"></a>
		  </div>
		  <div style="margin-top:12px">
			<button class="secondary" id="copyBtn" type="button" style="display:none;">Copia URL</button>
		  </div>
		  <div class="hint">Apri questo URL per installare l'addon in Stremio.</div>
		</div>
    </div>
  </div>

  <script>
    const BASE_URL = '__BASE_URL__';
    const DEFAULT_FEEDS = ['commedia', 'drammatico', 'thriller'];

    const GENRES = [
      ['action', 'Action'],
      ['animali-assassini', 'Animali assassini'],
      ['antologia', 'Antologia'],
      ['arti-marziali', 'Arti marziali'],
      ['avventura', 'Avventura'],
      ['biografico', 'Biografico'],
      ['comico', 'Comico'],
      ['commedia', 'Commedia'],
      ['corto-mediometraggio', 'Corto-mediometraggio'],
      ['documentario', 'Documentario'],
      ['drammatico', 'Drammatico'],
      ['erotico', 'Erotico'],
      ['fantascienza', 'Fantascienza'],
      ['fantastico', 'Fantastico'],
      ['fiction', 'Fiction'],
      ['gangster', 'Gangster'],
      ['giallo', 'Giallo'],
      ['guerra', 'Guerra'],
      ['horror', 'Horror'],
      ['musicale', 'Musicale'],
      ['peplum', 'Peplum'],
      ['poliziesco', 'Poliziesco'],
      ['sentimentale', 'Sentimentale'],
      ['spaghetti-western', 'Spaghetti western'],
      ['spionaggio', 'Spionaggio'],
      ['teatro', 'Teatro'],
      ['thriller', 'Thriller'],
      ['western', 'Western']
    ];

    const STREAMING = [
      ['netflix', 'Netflix'],
      ['amazon-prime-video', 'Amazon Prime Video'],
      ['now-tv', 'NOW TV'],
      ['rai-play', 'RaiPlay'],
      ['mubi', 'MUBI'],
      ['disney-plus', 'Disney+'],
      ['timvision', 'TIMvision'],
      ['mediaset-infinity', 'Mediaset Infinity'],
      ['chili', 'Chili'],
      ['apple-tv-plus', 'Apple TV+'],
      ['google-play-movies', 'Google Play Movies'],
      ['rakuten-tv', 'Rakuten TV'],
      ['amazon-video', 'Amazon Video'],
      ['paramount-plus', 'Paramount+'],
      ['apple-tv', 'Apple TV']
    ];

    function createOptions(containerId, items) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      items.forEach(([value, label]) => {
        const el = document.createElement('label');
        el.className = 'option';
        el.innerHTML = `<input type="checkbox" value="${value}"><span>${label}</span>`;
        container.appendChild(el);
      });
    }

    function getSelectedFeeds() {
      return Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(i => i.value);
    }

    function setChecked(values) {
      const set = new Set(values);
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        cb.checked = set.has(cb.value);
      });
    }

    function buildManifestUrl() {
      const feeds = getSelectedFeeds();
      const finalFeeds = feeds.length ? feeds : DEFAULT_FEEDS;
      const payload = btoa(JSON.stringify({ feeds: finalFeeds }));
      return `${BASE_URL}/${encodeURIComponent(payload)}/manifest.json`;
    }

	document.getElementById('installBtn').addEventListener('click', () => {
	  const url = buildManifestUrl();
	  const box = document.getElementById('resultBox');
	  const link = document.getElementById('manifestLink');

	  link.href = url;
	  link.textContent = url;
	  box.classList.add('visible');
	  document.getElementById('copyBtn').style.display = 'inline-block';
	});

    document.getElementById('selectDefaultsBtn').addEventListener('click', () => setChecked(DEFAULT_FEEDS));
    document.getElementById('clearBtn').addEventListener('click', () => setChecked([]));

    createOptions('genreOptions', GENRES);
    createOptions('streamingOptions', STREAMING);
    setChecked(DEFAULT_FEEDS);
	
	
	//Gestione bottoni seleziona/deseleziona tutto
	function setCheckedByValues(values) {
	  const set = new Set(values);
	  document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
		cb.checked = set.has(cb.value);
	  });
	}

	function setCheckedInContainer(containerId, checked) {
	  const container = document.getElementById(containerId);
	  container.querySelectorAll('input[type="checkbox"]').forEach(cb => {
		cb.checked = checked;
	  });
	}
	
	document.getElementById('selectAllGenresBtn').addEventListener('click', () => {
	  setCheckedInContainer('genreOptions', true);
	});

	document.getElementById('clearGenresBtn').addEventListener('click', () => {
	  setCheckedInContainer('genreOptions', false);
	});

	document.getElementById('selectAllStreamingBtn').addEventListener('click', () => {
	  setCheckedInContainer('streamingOptions', true);
	});

	document.getElementById('clearStreamingBtn').addEventListener('click', () => {
	  setCheckedInContainer('streamingOptions', false);
	});
	
	//bottone copia url risultante da mettere in Stremio
const copyBtn = document.getElementById('copyBtn');

if (copyBtn) {
  copyBtn.addEventListener('click', async () => {
    const link = document.getElementById('manifestLink').href;
    try {
      await navigator.clipboard.writeText(link);
      copyBtn.textContent = 'Copiato';
      setTimeout(() => {
        copyBtn.textContent = 'Copia URL';
      }, 1500);
    } catch {
      alert("Impossibile copiare automaticamente l'URL");
    }
  });
}
	
  </script>
</body>
</html>
